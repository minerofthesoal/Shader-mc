# HyperRealistic Shaders - Configuration
# For OptiFine / Iris (Minecraft Java Edition)

# Shadow settings
shadow.enabled=true
shadowMapResolution=2048
shadowDistance=128.0
shadowDistanceRenderMul=1.0
shadowIntervalSize=4.0

# Color buffer formats (HDR for bloom/tonemap)
colortex0Format=RGBA16F
colortex1Format=RGBA16F
colortex2Format=RGBA16F
colortex3Format=RGBA16F
colortex4Format=RGBA16F

# Programs
program.gbuffers_terrain.enabled=true
program.gbuffers_water.enabled=true
program.gbuffers_entities.enabled=true
program.gbuffers_hand.enabled=true
program.gbuffers_skybasic.enabled=true
program.gbuffers_skytextured.enabled=true
program.gbuffers_textured.enabled=true
program.gbuffers_textured_lit.enabled=true
program.gbuffers_weather.enabled=true
program.shadow.enabled=true
program.composite.enabled=true
program.composite1.enabled=true
program.composite2.enabled=true
program.final.enabled=true

# Composite buffer usage
composite.colortex0=true
composite.colortex1=true
composite.colortex2=true
composite.depthtex0=true
composite.shadowtex0=true
composite.shadowtex1=true
composite.shadowcolor0=true
composite1.colortex0=true
composite1.colortex1=true
composite1.colortex2=true
composite2.colortex0=true
composite2.colortex1=true
final.colortex0=true

# Slider options for user customization
sliders=SHADOW_RES SHADOW_DIST BLOOM_AMOUNT GODRAY_STRENGTH EXPOSURE SATURATION COLOR_TEMPERATURE VIGNETTE_AMOUNT WATER_WAVE_SIZE SSR_QUALITY

# Screen layout (shader options menu)
screen=<profile> <empty> [LIGHTING] [POST_PROCESSING] [WATER_OPTIONS] [ATMOSPHERE] [MISC]

screen.LIGHTING=SHADOWS SHADOW_RES SHADOW_DIST SHADOW_QUALITY DYNAMIC_LIGHTS TRUE_DARK
screen.POST_PROCESSING=BLOOM BLOOM_AMOUNT GODRAYS GODRAY_STRENGTH RAYTRACING SSR_QUALITY <empty> EXPOSURE SATURATION COLOR_TEMPERATURE
screen.WATER_OPTIONS=WATER_EFFECTS WATER_WAVE_SIZE WATER_CAUSTICS WATER_FOAM WATER_REFLECTIONS
screen.ATMOSPHERE=VOLUMETRIC_FOG AURORA CLOUDS WAVING_PLANTS SUBSURFACE_SCATTERING
screen.MISC=VIGNETTE VIGNETTE_AMOUNT CHROMATIC_ABERRATION NIGHT_EYE

# Profiles
profile.LOW=SHADOWS:true SHADOW_RES:1024 SHADOW_QUALITY:0 BLOOM:false GODRAYS:false RAYTRACING:false VOLUMETRIC_FOG:false AURORA:false CLOUDS:false SUBSURFACE_SCATTERING:false CHROMATIC_ABERRATION:false NIGHT_EYE:false SSR_QUALITY:0
profile.MEDIUM=SHADOWS:true SHADOW_RES:1024 SHADOW_QUALITY:1 BLOOM:true GODRAYS:true RAYTRACING:false VOLUMETRIC_FOG:true AURORA:true CLOUDS:true SUBSURFACE_SCATTERING:true CHROMATIC_ABERRATION:false NIGHT_EYE:true SSR_QUALITY:0
profile.HIGH=(default)
profile.ULTRA=SHADOWS:true SHADOW_RES:4096 SHADOW_QUALITY:2 BLOOM:true GODRAYS:true RAYTRACING:true VOLUMETRIC_FOG:true AURORA:true CLOUDS:true SUBSURFACE_SCATTERING:true CHROMATIC_ABERRATION:true NIGHT_EYE:true SSR_QUALITY:2
