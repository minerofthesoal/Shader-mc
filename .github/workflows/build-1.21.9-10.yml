name: Build Shader Pack (1.21.9-10)

on:
  push:
    branches: [ main, 'claude/**' ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Minecraft Java 1.21.9-10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shader files
        run: |
          echo "Checking shader files..."
          for f in shaders/*.vsh shaders/*.fsh; do
            if [ -f "$f" ]; then
              echo "  $f ($(wc -l < "$f") lines)"
            fi
          done
          test -f shaders/shaders.properties || { echo "ERROR: Missing shaders.properties"; exit 1; }
          echo "Validation passed"

      - name: Build for 1.21.9
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh 1.21.9
          mkdir -p release-assets
          cp build/*.zip release-assets/

      - name: Build for 1.21.10
        run: |
          rm -rf build
          bash scripts/build.sh 1.21.10
          cp build/*.zip release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperRealistic-Shaders-1.21.9-10
          path: release-assets/*.zip
          retention-days: 30

  release:
    name: Create Release (1.21.9-10)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all versions
        run: |
          chmod +x scripts/build.sh
          mkdir -p release-assets
          bash scripts/build.sh 1.21.9
          cp build/*.zip release-assets/
          rm -rf build
          bash scripts/build.sh 1.21.10
          cp build/*.zip release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-mc1.21.9-10
          name: "HyperRealistic Shaders v1.0.0 (MC 1.21.9-10)"
          body: |
            ## HyperRealistic Shaders for Minecraft Java Edition 1.21.9 - 1.21.10

            ### Features
            - ACES filmic tone mapping and color grading
            - Volumetric sun god rays
            - Screen-space ray tracing (SSR)
            - HDR Bloom
            - Shadow mapping with PCF soft shadows
            - Animated water with waves, caustics, and reflections
            - Dynamic colored lighting
            - Volumetric height fog
            - Subsurface scattering, aurora borealis, clouds
            - True Dark mode, night eye adaptation
            - Waving vegetation, vignette, chromatic aberration

            ### Installation
            1. Install OptiFine or Iris (Fabric)
            2. Place `.zip` in `.minecraft/shaderpacks/`
            3. Select in Video Settings > Shaders
            4. Adjust quality in Shader Options

            ### Compatibility
            - Minecraft Java Edition 1.21.9 and 1.21.10
            - OptiFine or Iris required
          draft: false
          prerelease: false
          files: |
            release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
