name: Build Shader Pack (1.21.11)

on:
  push:
    branches: [ main, 'claude/**' ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for Minecraft Java 1.21.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shader files
        run: |
          echo "Checking shader files..."
          REQUIRED=(
            "shaders/gbuffers_terrain.vsh"
            "shaders/gbuffers_terrain.fsh"
            "shaders/gbuffers_water.vsh"
            "shaders/gbuffers_water.fsh"
            "shaders/gbuffers_skybasic.vsh"
            "shaders/gbuffers_skybasic.fsh"
            "shaders/shadow.vsh"
            "shaders/shadow.fsh"
            "shaders/composite.vsh"
            "shaders/composite.fsh"
            "shaders/final.vsh"
            "shaders/final.fsh"
            "shaders/shaders.properties"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing: $f"
              exit 1
            fi
            echo "  OK: $f ($(wc -l < "$f") lines)"
          done
          echo ""
          echo "All shader files:"
          find shaders/ -type f | sort | while read f; do
            echo "  $f ($(wc -l < "$f") lines)"
          done

      - name: Validate GLSL syntax
        run: |
          echo "Checking for common GLSL errors..."
          ERRORS=0
          for f in shaders/*.vsh shaders/*.fsh; do
            if [ -f "$f" ]; then
              if ! head -1 "$f" | grep -q '#version'; then
                echo "WARNING: $f missing #version directive"
              fi
            fi
          done
          echo "Syntax check complete"

      - name: Build shader pack
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh 1.21.11

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperRealistic-Shaders-1.21.11
          path: build/*.zip
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          LINES=$(find shaders/ -name '*.fsh' -o -name '*.vsh' | xargs wc -l | tail -1 | awk '{print $1}')
          echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          echo "Total shader lines: ${LINES}"

      - name: Build shader pack
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh 1.21.11

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-mc1.21.11
          name: "HyperRealistic Shaders v${{ steps.version.outputs.version }} (MC 1.21.11)"
          body: |
            ## HyperRealistic Shaders for Minecraft Java Edition 1.21.11

            ### Features
            - Hyper-realistic ACES filmic tone mapping and color grading
            - Volumetric sun god rays (light shafts)
            - Toggleable screen-space ray tracing (SSR reflections)
            - HDR Bloom with gaussian blur
            - Shadow mapping with PCF soft shadows
            - Animated water with Gerstner waves, caustics, foam, and reflections
            - Dynamic colored lighting (torches, lava, glowstone)
            - Volumetric height fog
            - Subsurface scattering on vegetation
            - Aurora borealis at night
            - Volumetric clouds
            - Optional True Dark mode
            - Night eye adaptation
            - Chromatic aberration and vignette
            - Waving grass, leaves, and flowers

            ### Installation
            1. Install [OptiFine](https://optifine.net) or [Iris](https://irisshaders.dev) (Fabric)
            2. Download the `.zip` file
            3. Place in `.minecraft/shaderpacks/`
            4. Select in Video Settings > Shaders
            5. Configure features in Shader Options menu

            ### Compatibility
            - Minecraft Java Edition 1.21.9, 1.21.10, 1.21.11
            - Requires OptiFine or Iris shader loader
            - All quality presets configurable in-game (Low/Medium/High/Ultra)
          draft: false
          prerelease: false
          files: |
            build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
